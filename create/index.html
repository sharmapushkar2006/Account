<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <script type="module"src="firebase.js"></script>
    <main class="page">
      <section class="signup-card">
        <div class="brand-panel">
          <p class="eyebrow">Welcome aboard</p>
          <h1 id="signup-heading">Create your account</h1>
          <p class="brand-copy">
            Build a secure account in seconds with a modern sign-up experience.
          </p>
        </div>

        <div class="form-panel">
          <div id="signup-form" role="form" aria-labelledby="signup-heading">
            <div class="field-group">
              <label for="name">Full name</label>
              <input id="name" name="name" type="text" placeholder="Narendra Modi" required />
            </div>

            <div class="field-group">
              <label for="email">Email address</label>
              <input id="email" name="email" type="email" placeholder="example@mail.com" required />
            </div>

            <div class="field-group">
              <label for="password">Password</label>
              <input id="password" name="password" type="password" placeholder="At least 8 characters" required />
            </div>

            <div class="field-group">
              <label for="confirm-password">Confirm password</label>
              <input id="confirm-password" name="confirm-password" type="password" placeholder="Re-enter password" required />
            </div>

            <button type="button" id="Submit-btn">Create account</button>

            <p class="form-footer">
              Already have an account?
              <a href="#">Log in</a>
            </p>
            <p id="form-message" class="form-message" aria-live="polite"></p>
          </div>
        </div>
      </section>
    </main>
    <div id="information" style="display: none;">_ERROR_</div>
    <script src="wallpaper.js"></script>
    <script src="script.js"type="module"></script>
  </body>
</html>
